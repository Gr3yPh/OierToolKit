name: Sync Release to Mirror (PHP upload)

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Install gh CLI
        uses: cli/gh-action@v2

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p downloads
          echo "Downloading assets for tag: ${{ github.event.release.tag_name }}"
          gh release download "${{ github.event.release.tag_name }}" --pattern "*" -D downloads
          echo "Downloaded files:"
          ls -lah downloads || true

      - name: Upload each file to mirror via HTTP
        env:
          MIRROR_URL: ${{ secrets.MIRROR_UPLOAD_URL }}
          MIRROR_TOKEN: ${{ secrets.MIRROR_UPLOAD_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${MIRROR_URL:-}" ] || [ -z "${MIRROR_TOKEN:-}" ]; then
            echo "MIRROR_UPLOAD_URL or MIRROR_UPLOAD_TOKEN not set"
            exit 1
          fi
          cd downloads
          for f in *; do
            [ -e "$f" ] || continue
            echo "Uploading $f ..."
            resp=$(curl -s -w "\n%{http_code}" -H "X-UPLOAD-TOKEN: $MIRROR_TOKEN" -F "file=@$f" -F "tag=${{ github.event.release.tag_name }}" "$MIRROR_URL")
            body=$(echo "$resp" | sed '$d')
            code=$(echo "$resp" | tail -n1)
            echo "Response code: $code"
            echo "Body: $body"
            if [ "$code" != "200" ] && [ "$code" != "201" ]; then
              echo "Upload failed for $f"
              exit 1
            fi
          done
